<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Reconciliation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f45;
    --accent: #4f8cff;
    --accent-dim: rgba(79,140,255,0.12);
    --yellow: #f5c842;
    --green: #3ecf8e;
    --red: #ff5c5c;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px 40px;
}

.layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
    max-width: 1100px;
}

/* subtle grid background */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
}

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 520px;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

/* accent glow top-left corner */
.card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 120px; height: 4px;
    background: var(--accent);
    border-radius: 16px 0 0 0;
}

.header {
    margin-bottom: 32px;
}

.tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(79,140,255,0.25);
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 14px;
}

h1 {
    font-family: var(--sans);
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
}

.subtitle {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 300;
}

.field {
    margin-bottom: 20px;
}

.field-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: block;
}

.file-drop {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: var(--surface2);
}

.file-drop:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
}

.file-drop.has-file {
    border-color: var(--green);
    border-style: solid;
    background: rgba(62,207,142,0.06);
}

.file-drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
}

.file-icon {
    font-size: 22px;
    margin-bottom: 6px;
}

.file-text {
    font-size: 13px;
    color: var(--text-dim);
}

.file-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--green);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
}

.ai-toggle {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 24px;
}

.ai-toggle:hover { border-color: var(--yellow); }

.ai-toggle.active {
    border-color: var(--yellow);
    background: rgba(245,200,66,0.06);
}

.ai-toggle input { display: none; }

.toggle-dot {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
}

.ai-toggle.active .toggle-dot {
    border-color: var(--yellow);
    background: var(--yellow);
}

.toggle-dot::after {
    content: '✓';
    font-size: 11px;
    color: #000;
    opacity: 0;
    transition: opacity 0.15s;
}

.ai-toggle.active .toggle-dot::after { opacity: 1; }

.toggle-info { flex: 1; }

.toggle-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
}

.toggle-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
}

.btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
}

.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.99); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.status-box {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 10px;
}

.status-box.show { display: flex; }

.status-box.processing {
    background: var(--accent-dim);
    border: 1px solid rgba(79,140,255,0.25);
    color: var(--accent);
}

.status-box.success {
    background: rgba(62,207,142,0.08);
    border: 1px solid rgba(62,207,142,0.25);
    color: var(--green);
}

.status-box.warning {
    background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.25);
    color: var(--yellow);
}

.status-box.error {
    background: rgba(255,92,92,0.08);
    border: 1px solid rgba(255,92,92,0.25);
    color: var(--red);
}

.spinner {
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.download-btn {
    display: none;
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: background 0.2s;
}

.download-btn:hover { background: rgba(62,207,142,0.08); }
.download-btn.show { display: block; }


/* ── Terminal panel ─────────────────────────────────────── */
.terminal {
    flex: 1;
    min-width: 380px;
    background: #08090d;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
    flex-direction: column;
    height: 580px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

.terminal.show { display: flex; }

.terminal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}

.terminal-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
}

.terminal-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
}

.terminal-dot.active {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: tpulse 1.2s ease-in-out infinite;
}

@keyframes tpulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
}

.terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.75;
    color: #6b7590;
    scroll-behavior: smooth;
}

.terminal-body::-webkit-scrollbar { width: 4px; }
.terminal-body::-webkit-scrollbar-track { background: transparent; }
.terminal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-line { white-space: pre-wrap; word-break: break-all; }
.log-line.sending { color: var(--accent); }
.log-line.raw     { color: rgba(245,200,66,0.55); }
.log-line.matched { color: var(--green); }
.log-line.logerr  { color: var(--red); }
.log-line.header  { color: #c8d0e0; }
.log-line.done    { color: var(--green); font-weight: 600; }

.provider-row { display: none; margin-bottom: 20px; }
.provider-row.show { display: block; }

.provider-options {
    display: flex;
    gap: 10px;
}

.provider-opt {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.provider-opt input { display: none; }

.provider-opt.active {
    border-color: var(--accent);
    background: var(--accent-dim);
}

.provider-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
}

.provider-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.3;
}

@media (max-width: 900px) {
    .layout { flex-direction: column; }
    .card   { max-width: none; }
    .terminal { min-width: unset; height: 400px; }
}
</style>
</head>

<body>
<div class="layout">
<div class="card">

    <div class="header">
        <div class="tag">Finance Tool</div>
        <h1>Account Reconciliation</h1>
        <p class="subtitle">Upload your bank statement and books to find discrepancies</p>
    </div>

    <form id="uploadForm">

        <div class="field">
            <span class="field-label">Account Statement</span>
            <div class="file-drop" id="drop1">
                <input type="file" name="ac_statement" accept=".xls,.xlsx" required>
                <div class="file-icon">🏦</div>
                <div class="file-text">Click to upload <span style="color:var(--text-dim)">· .xls / .xlsx</span></div>
                <div class="file-name" id="name1"></div>
            </div>
        </div>

        <div class="field">
            <span class="field-label">Our Books</span>
            <div class="file-drop" id="drop2">
                <input type="file" name="our_books" accept=".xls,.xlsx" required>
                <div class="file-icon">📒</div>
                <div class="file-text">Click to upload <span style="color:var(--text-dim)">· .xls / .xlsx</span></div>
                <div class="file-name" id="name2"></div>
            </div>
        </div>

        <div class="divider"></div>

        <label class="ai-toggle" id="aiToggle">
            <input type="checkbox" name="ai_matching" id="aiCheck">
            <div class="toggle-dot"></div>
            <div class="toggle-info">
                <div class="toggle-title">✦ AI Matching</div>
                <div class="toggle-desc">Highlights likely matches in yellow using name + amount signals</div>
            </div>
        </label>

        <div class="provider-row" id="providerRow">
            <span class="field-label" style="margin-bottom:10px;display:block;">AI Provider</span>
            <div class="provider-options">
                <label class="provider-opt active" id="optGemini">
                    <input type="radio" name="ai_provider" value="gemini" checked>
                    <span class="provider-name">Gemini 2.5 Flash</span>
                    <span class="provider-desc">Highlights matched entries in yellow</span>
                </label>
                <label class="provider-opt" id="optOpenAI">
                    <input type="radio" name="ai_provider" value="openai">
                    <span class="provider-name">GPT-5 Nano</span>
                    <span class="provider-desc">Highlights unmatched entries in orange</span>
                </label>
            </div>
        </div>

        <button class="btn" type="submit" id="submitBtn">Run Reconciliation</button>

    </form>

    <div class="status-box" id="statusBox">
        <div class="spinner" id="spinner"></div>
        <span id="statusText"></span>
    </div>

    <a class="download-btn" id="downloadBtn" download="reconciliation.xlsx">
        ↓ Download reconciliation.xlsx
    </a>

</div><!-- .card -->

<div class="terminal" id="terminal">
    <div class="terminal-header">
        <span class="terminal-title">AI Matching Log</span>
        <span class="terminal-dot" id="terminalDot"></span>
    </div>
    <div class="terminal-body" id="terminalBody"></div>
</div>

</div><!-- .layout -->

<script>
const providerRow   = document.getElementById("providerRow")
const form          = document.getElementById("uploadForm")
const statusBox     = document.getElementById("statusBox")
const statusText    = document.getElementById("statusText")
const spinner       = document.getElementById("spinner")
const downloadBtn   = document.getElementById("downloadBtn")
const submitBtn     = document.getElementById("submitBtn")
const aiToggle      = document.getElementById("aiToggle")
const aiCheck       = document.getElementById("aiCheck")
const terminal      = document.getElementById("terminal")
const terminalBody  = document.getElementById("terminalBody")
const terminalDot   = document.getElementById("terminalDot")

// File input labels
document.querySelectorAll('.file-drop input[type="file"]').forEach((input) => {
    input.addEventListener('change', () => {
        const drop   = input.closest('.file-drop')
        const nameEl = drop.querySelector('.file-name')
        if (input.files[0]) {
            nameEl.textContent = input.files[0].name
            drop.classList.add('has-file')
        }
    })
})

// AI toggle
aiToggle.addEventListener('click', () => {
    setTimeout(() => {
        aiToggle.classList.toggle('active', aiCheck.checked)
        providerRow.classList.toggle('show', aiCheck.checked)
    }, 0)
})

// Provider selector
document.querySelectorAll('.provider-opt').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.provider-opt').forEach(o => o.classList.remove('active'))
        opt.classList.add('active')
    })
})

function setStatus(type, msg, showSpinner) {
    statusBox.className = 'status-box show ' + type
    statusText.textContent = msg
    spinner.style.display = showSpinner ? 'block' : 'none'
}

function lineClass(msg) {
    if (msg.includes('sending to model'))              return 'sending'
    if (msg.includes('→ raw:'))                        return 'raw'
    if (msg.includes('→ matched'))                     return 'matched'
    if (msg.includes('ERROR') || msg.includes('WARN')) return 'logerr'
    if (msg.includes('Done.'))                         return 'done'
    if (msg.includes('Sheet:') || msg.includes('AI matching started')) return 'header'
    return ''
}

function appendLog(msg) {
    const line = document.createElement('div')
    line.className = 'log-line ' + lineClass(msg)
    line.textContent = msg
    terminalBody.appendChild(line)
    terminalBody.scrollTop = terminalBody.scrollHeight
}

async function fetchResult(sessionId) {
    try {
        const response = await fetch(`/result/${sessionId}`)
        if (!response.ok) {
            const data = await response.json()
            setStatus('error', 'Error: ' + (data.error || 'Download failed'), false)
            submitBtn.disabled = false
            return
        }
        const aiRan = response.headers.get('X-AI-Ran')
        const blob  = await response.blob()
        const url   = URL.createObjectURL(blob)
        if (aiRan === 'ran') {
            setStatus('success', 'Done — AI matching applied', false)
        } else if (aiRan === 'skipped') {
            setStatus('warning', 'Done — AI matching was skipped (check API key or logs)', false)
        } else {
            setStatus('success', 'Done!', false)
        }
        downloadBtn.href = url
        downloadBtn.classList.add('show')
    } catch(err) {
        setStatus('error', 'Download failed — is the server running?', false)
    }
    submitBtn.disabled = false
    terminalDot.classList.remove('active')
}

form.addEventListener("submit", async function(e) {
    e.preventDefault()

    downloadBtn.classList.remove('show')
    submitBtn.disabled = true
    setStatus('processing', 'Processing your files…', true)

    const formData = new FormData(form)

    try {
        const response = await fetch("/process", { method: "POST", body: formData })

        if (!response.ok) {
            const data = await response.json()
            setStatus('error', 'Error: ' + (data.error || 'Something went wrong'), false)
            submitBtn.disabled = false
            return
        }

        const { session_id, use_ai } = await response.json()

        if (use_ai) {
            // Show terminal and open SSE stream
            terminal.classList.add('show')
            terminalBody.innerHTML = ''
            terminalDot.classList.add('active')

            const source = new EventSource(`/stream/${session_id}`)

            source.addEventListener('log', (e) => {
                appendLog(e.data)
            })

            source.addEventListener('done', (e) => {
                source.close()
                fetchResult(session_id)
            })

            source.onerror = () => {
                source.close()
                fetchResult(session_id)
            }
        } else {
            // No AI — fetch result directly (server blocks until processing done)
            fetchResult(session_id)
        }

    } catch(err) {
        setStatus('error', 'Request failed — is the server running?', false)
        submitBtn.disabled = false
    }
})
</script>

</body>
</html>
